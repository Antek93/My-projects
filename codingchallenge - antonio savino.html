<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <title>Coding Challenge</title>

  <!-- CSS -->
  <link rel="stylesheet" href="codingchallenge.css">

  <!-- Google Font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Comic+Neue">
</head>

<body>

  <div id="wrapper">

    <!-- Header -->
    <header class="top container">
      <img class="logo" src="logo.png" alt="Company logo">
      <h1>Taking Boolean from A to B</h1>
    </header>

    <!-- Navigation -->
    <nav class="centralcontainer">
      <button type="button">Prenota</button>
      <button type="button">Termina la prenotazione</button>
      <button type="button">Accendi la luce</button>
    </nav>

    <!-- List of Vehicles -->
    <main class="vehicle-list">
      <!-- Vehicle Component -->
      <article class="vehicle">
        <label>
          <input type="checkbox" name="gino22">
          <span class="vehicle-name">Monopattino Gino22</span>
        </label>
        <p class="vehicle-position">&#8614; Via Guadalametri — a 220 metri da te</p>
        <p class="battery-label">Stato carica:</p>
        <div class="battery-bar" id="battery-bar-1"></div>
      </article>

      <article class="vehicle">
        <label>
          <input type="checkbox" name="mike24">
          <span class="vehicle-name">Monopattino Mike24</span>
        </label>
        <p class="vehicle-position">&#8614; Via Ricciardoni — a 420 metri da te</p>
        <p class="battery-label">Stato carica:</p>
        <div class="battery-bar" id="battery-bar-2"></div>
      </article>

      <article class="vehicle">
        <label>
          <input type="checkbox" name="fede154">
          <span class="vehicle-name">Monopattino Fede154</span>
        </label>
        <p class="vehicle-position">&#8614; Via Mentarini — a 490 metri da te</p>
        <p class="battery-label">Stato carica:</p>
        <div class="battery-bar" id="battery-bar-3"></div>
      </article>
    </main>
  </div>
</body>
</html>
